markers:
  - id: "A_HEART_EMOJI"
    level: 1
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "HEART_EMOJI"
    description: "Atomic-Marker für ❤️ als Ausdruck von Zuneigung oder Dankbarkeit."
    category: "ATOMIC"
    atomic_pattern:
      - "❤️"
    tags:
      - "affection"
      - "emoji"
    semantic_grabber_id: "SGR_HEART_EMOJI_01"
    examples:
      - "Danke für alles ❤️"
      - "Gute Nacht ❤️"
      - "Ich hab dich lieb ❤️"
      - "Fühl dich gedrückt ❤️"
      - "❤️"

  - id: "A_BRO_LIKE_CALLING"
    level: 1
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "BRO_LIKE_CALLING"
    description: |
      Direktanreden oder Spitznamen, die eine freundschaftlich-vertraute Ebene signalisieren, oft verspielt, neckisch oder liebevoll.
    category: "ATOMIC"
    atomic_pattern:
      - "Digga"
      - "Brudi"
      - "Alter"
      - "Vogel"
      - "Schatzi"
    tags:
      - "freundschaft"
      - "umgangssprache"
    semantic_grabber_id: "SGR_BRO_LIKE_CALLING"
    examples:
      - "Digga, was geht?"
      - "Brudi, ich vermiss dich!"
      - "Alter, du bist der Beste!"
      - "Ey du Vogel, ich feier dich."
      - "Schatzi, komm klar jetzt 😂"

  - id: "A_DAILY_GREETING"
    level: 1
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "DAILY_GREETING"
    description: |
      Alltägliche Begrüßungs- und Verabschiedungsformeln, die regelmäßigen Kontakt und Routine im Chat signalisieren.
    category: "ATOMIC"
    atomic_pattern:
      - "Guten Morgen"
      - "Gute Nacht"
      - "Schönen Abend"
      - "Morgen"
      - "Nacht"
    tags:
      - "kontakt"
      - "routine"
    semantic_grabber_id: "SGR_DAILY_GREETING"
    examples:
      - "Guten Morgen! Hoffe, du hast gut geschlafen."
      - "Gute Nacht, träum was Schönes."
      - "Schönen Abend dir noch!"
      - "Morgen 😊 Wie läuft’s bei dir?"
      - "Nacht 🌙 Wir schreiben morgen."

  - id: "A_BLAME_SHIFT"
    level: 1
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "BLAME_SHIFT"
    description: |
      Atomic Marker für Schuldumkehr-Formulierungen (Blame Shifting), die Verantwortung abweisen und auf das Gegenüber projizieren.
    category: "ATOMIC"
    atomic_pattern:
      - "nicht meine Schuld"
      - "wenn du"
      - "wegen dir"
      - "deine Schuld"
    tags:
      - "schuld"
      - "verantwortung"
    semantic_grabber_id: "SGR_BLAME_SHIFT"
    examples:
      - "Nicht meine Schuld, du hast mich nicht informiert."
      - "Wärst du früher dran gewesen, gäb’s das Problem nicht."
      - "Wenn du pünktlich wärst, müssten wir jetzt nicht diskutieren."
      - "Wegen dir haben wir Verspätung."
      - "Du hast das komplett falsch vorbereitet."

  - id: "S_INDIRECT_DECLINE"
    level: 2
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "INDIRECT_DECLINE"
    description: |
      Semantic group for polite or soft rejections, combining multiple weak withdrawal formulas.
    category: "SEMANTIC"
    composed_of:
      - type: atomic
        marker_ids:
          - "A_EXAMPLE"
          - "A_ANOTHER_EXAMPLE"
    rules:
      - type: co_occurrence
        condition: "innerhalb_von"
        value: 3
      - type: frequency
        threshold: 1
        scope: "conversation_chunk"
    tags:
      - "decline"
      - "politeness"
    semantic_grabber_id: "SGR_INDIRECT_DECLINE_01"
    examples:
      - "Sorry, hab grad wirklich kaum Zeit. Bin mir nicht sicher, wann ich kann."
      - "Ich schau später mal, klingt gut, aber nicht sicher heute."
      - "Mal sehen, vielleicht später, weiß noch nicht genau."
      - "Kann ich mich melden, wenn’s bei mir passt?"
      - "Ist jetzt gerade ungünstig, melde mich dann wieder."

  - id: "C_RELATIONSHIP_INSECURITY"
    level: 3
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "RELATIONSHIP_INSECURITY"
    description: |
      Cluster of semantic markers indicating relational uncertainty or avoidance behavior over several messages.
    category: "CLUSTER"
    composed_of:
      - type: semantic
        marker_ids:
          - "S_INDIRECT_DECLINE"
          - "S_WITHDRAWAL"
    activation_logic: "S_INDIRECT_DECLINE OR S_WITHDRAWAL"
    scoring:
      weight: 1.2
      priority: mid
    tags:
      - "insecurity"
      - "avoidance"
    semantic_grabber_id: "SGR_REL_INSEC_01"
    examples:
      - |
        > A: "Ich meld mich später, okay?"  
        > A (drei Tage später): "Sorry, war mega stressig …"
      - "Mehrfache Absagen kombiniert mit Distanzierungssignalen."
      - "Vermehrt höfliche, aber nicht feste Zusagen."

  - id: "MM_DISTANCING_BEHAVIOR"
    level: 4
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "DISTANCING_BEHAVIOR"
    description: |
      Meta-marker for overarching distancing dynamics, triggered by recurring relationship-insecurity or withdrawal clusters.
    category: "META"
    composed_of:
      - type: cluster
        marker_ids:
          - "C_RELATIONSHIP_INSECURITY"
          - "C_WITHDRAWAL"
    trigger_threshold: 1
    scoring:
      weight: 1.5
      priority: high
    tags:
      - "distancing"
      - "risk"
    semantic_grabber_id: "SGR_DISTANCING_01"
    examples:
      - |
        > A: "Sorry, hab grad wenig Zeit."  
        > B: "Alles gut."  
        > A (zwei Tage später): "Wieder stressig hier …"
      - "Wiederholte Ausweich- und Absagemuster."
