id: SEM_SYSTEM_TURNING_CLUSTER
name: SYSTEM_TURNING_CLUSTER
level: 2
category: SEMANTIC
description: "Erkennt Konstellationen, in denen mehrere Einzelmarker gemeinsam einen abrupten Kipppunkt oder eine unumkehrbare Richtungsänderung im System erzeugen (z. B. Trennung, Fusion, öffentliche Eskalation, plötzlicher Neuanfang)."
examples:
  - "Nach langer Distanz sagt einer: 'Ich will dich nicht verlieren. Ich bin bereit, alles zu tun, was nötig ist, um uns zu retten.'"
  - "Ein riskantes, innovatives Projekt erhält grünes Licht und verändert die Team-Strategie grundlegend."
  - "Ein volljähriges Kind kündigt Kontaktabbruch an, falls die Eltern keine Grenzen respektieren."
  - "Nach eskalierendem Streit blockiert eine Person die andere auf allen Kanälen."
  - "Aha-Moment in Therapie: altes Muster wird abrupt gebrochen und setzt sich nicht fort."
