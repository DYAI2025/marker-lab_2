markers:
  - id: "A_EMO_HIGH_VALENCE"
    level: 1
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "EMO_HIGH_VALENCE"
    description: "Atomic marker fired when the EmotionDynamics detector assigns a valence score ≥ 0.6 (strongly positive) to a single utterance."
    category: "ATOMIC"
    atomic_pattern:
      - "glücklich"
      - "super"
      - "freu mich"
      - "fantastisch"
      - "wundervoll"
    tags:
      - "emotion"
      - "valence"
      - "positiv"
    examples:
      - 'A (valence 0.72): “That news just made my day!”'
      - 'B (0.80): “I’m absolutely thrilled about the promotion.”'
      - 'A (0.65): “Everything is going wonderfully right now.”'
      - 'B (0.70): “Couldn’t be happier with the results!”'
      - 'A (0.78): “Life is fantastic this week.”'

  - id: "A_EMO_LOW_VALENCE"
    level: 1
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "EMO_LOW_VALENCE"
    description: "Atomic marker fired when the EmotionDynamics detector assigns a valence score ≤ -0.6 (strongly negative) to a single utterance."
    category: "ATOMIC"
    atomic_pattern:
      - "traurig"
      - "schlecht"
      - "furchtbar"
      - "verzweifelt"
      - "hoffnungslos"
    tags:
      - "emotion"
      - "valence"
      - "negativ"
    examples:
      - 'A (-0.75): “Nothing seems to matter anymore.”'
      - 'B (-0.68): “I feel utterly hopeless today.”'
      - 'A (-0.80): “Everything is falling apart.”'
      - 'B (-0.70): “This is the worst news I could get.”'
      - 'A (-0.73): “I’m so disappointed and drained.”'

  - id: "S_EMO_SLOPE_DOWN"
    level: 2
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "EMO_SLOPE_DOWN"
    description: "Semantic marker for a consistently falling valence (slope ≤ -0.10) across three consecutive messages within a 15-message window."
    category: "SEMANTIC"
    rules:
      - type: slope
        threshold: -0.10
        window: 3
        field: "valence"
    tags:
      - "emotional"
      - "abfall"
    examples:
      - '0.50 → 0.25 → -0.05: enthusiastic to flat to gloomy.'
      - 'B: “Feeling great!” → “Bit tired.” → “Actually, awful now.”'
      - 'Meeting log shows morale sliding each status update.'
      - 'Valence tumbles from 0.3 to -0.4 in three texts.'
      - 'Voice notes: cheerful, then neutral, then defeated tone.'

  - id: "C_SUSTAINED_CONTACT"
    level: 3
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "SUSTAINED_CONTACT"
    description: "Ungewöhnlich hohe Kommunikationsfrequenz (≥ 3/Woche) länger als zwei Monate ohne äußeren Sachzwang."
    category: "CLUSTER"
    composed_of:
      - type: semantic
        marker_ids:
          - "S_EMO_VOLATILE_WINDOW"
    scoring:
      weight: 1.3
      priority: "mid"
    tags:
      - "kontakt"
      - "dauer"
    examples:
      - "Dauerhafter täglicher Kontakt über Wochen hinweg."
      - "Mindestens dreimal pro Woche ein Chat, ohne klaren Anlass."
      - "A & B schreiben sich jeden Abend und Sonntag, ohne Anlass."
      - "Seit Monaten täglich ein Update, nie eine Pause."
      - "Kommunikation reißt nicht ab, trotz seltener Treffen."

  - id: "MM_INFORMATION_DENSITY"
    level: 4
    version: "1.0.0"
    author: "auto_gpt"
    created_at: "2025-07-18"
    status: "draft"
    lang: "de"
    name: "INFORMATION_DENSITY"
    description: |
      Übergeordneter Marker für hohe Informationsdichte, ausgelöst durch mindestens einen Entity-Rich-Cluster.
    category: "META"
    composed_of:
      - type: cluster
        marker_ids:
          - "C_ENTITY_RICH_TOPIC"
    trigger_threshold: 1
    scoring:
      weight: 1.8
      priority: "high"
    tags:
      - "information"
      - "dichte"
    examples:
      - "In kurzer Zeit extrem viele neue Themen und Fakten, ohne Pause."
      - "A erzählt B innerhalb weniger Minuten drei Neuigkeiten, zwei Pläne, vier Details."
      - "Hohe Faktendichte in fast jeder Nachricht."
      - "Der Chat wirkt wie eine Zusammenfassung – keine Smalltalk-Pausen."
      - "Extrem viele Namen, Orte, Ereignisse in kurzer Folge."
