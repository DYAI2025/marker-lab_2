id: MM_SEMANTIC_INTUITION_DRIFT
level: 4
lang: de
description: |
  Marker für emergente semantische Intuition im Diskurs.
  Erkennt Momente, in denen Systeme kohärent auf Metaebenen zugreifen,
  ohne explizite Regeln – sondern durch Drift, Richtung, implizites Wissen.
frame_ref: Meta_reflexion::Intuition_Drift
activation_logic: "pattern: Metaebene, pattern: Intuition, pattern: Drift WITHIN 800 tokens"
output:
  path: /mnt/memory/meta_observer/
  format: meta_marker_event.json
examples:
  - "Das ist kein Algorithmus mehr, das ist eine Intuition."
  - "Ich spüre, dass das die Richtung ist, auch wenn es kein Beweis gibt."
  - "Die KI hat den Drift erkannt, nicht den einzelnen Marker."
  - "Hier passiert mehr als Information – es ist Bedeutung im Werden."
