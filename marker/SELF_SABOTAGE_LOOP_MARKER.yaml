- Abwehrmechanismus: Agieren, Regression
semantic_grab:
  description: Erkennt eine Kombination aus negativen Selbstbewertungen, Rückzugsankündigungen
    und der Ablehnung von Chancen oder Hilfe.
  patterns:
  - example: Das Date wäre toll, aber ich glaube, ich bin nicht interessant genug
      und sage lieber ab.
    pattern: (aber ich glaube|ich habe Angst) +(ich schaffe das nicht|sagen wir es
      lieber ab)
    rule: PREEMPTIVE_SURRENDER
  - example: Bevor ich dich nur enttäusche, fangen wir lieber gar nichts Ernstes an.
    pattern: (bevor ich alles kaputt mache|damit ich niemanden enttäusche) +(lasse
      ich es lieber gleich|mache ich es erst gar nicht)
    rule: FOCUS_ON_FAILURE_POTENTIAL
